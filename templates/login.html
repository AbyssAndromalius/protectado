<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t['app.name'] }} — {{ t['login.title'] }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }
    .login-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f8fafc;
      text-align: center;
      margin-bottom: 6px;
    }
    .login-sub {
      color: #64748b;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      outline: none;
      margin-bottom: 20px;
    }
    input[type="password"]:focus { border-color: #3b82f6; }
    button[type="submit"] {
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: #2563eb; }
    .error-msg {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-title">🛡️ {{ t['app.name'] }}</div>
    <div class="login-sub">{{ t['login.access_reserved'] }}</div>

    {% if error == '1' or error == 1 %}
    <div class="error-msg">{{ t['login.wrong_password'] }}</div>
    {% elif error == '2' or error == 2 %}
    <div class="error-msg">{{ t['login.rate_limited'] }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="password">{{ t['login.password_label'] }}</label>
      <input type="password" id="password" name="password" autofocus placeholder="••••••••">
      <button type="submit">{{ t['login.submit'] }}</button>
    </form>
  </div>
</body>
</html>
